<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Ronald Max | AI/ML Engineer & Software Engineer</title>
    <meta name="description" content="Personal portfolio of Ronald Max — AI/ML Engineer, Deep Learning practitioner, and Generative AI enthusiast. View projects, experience, and skills." />
    <meta name="keywords" content="Ronald Max, AI Engineer, ML Engineer, Machine Learning, Deep Learning, Generative AI, Portfolio" />
    <meta name="author" content="Ronald Max" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Ronald Max | AI/ML Engineer" />
    <meta property="og:description" content="AI/ML Engineer building intelligent systems across ML, GenAI, and MLOps." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ronaldmax.dev" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ronald Max | AI/ML Engineer" />
    <meta name="twitter:description" content="AI/ML Engineer building intelligent systems across GenAI and MLOps." />
    <meta name="twitter:creator" content="@RonaldMax" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <script>
      (function () {
        var key = 'portfolio-theme';
        var theme = 'dark';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark') theme = stored;
        } catch (e) {}
        document.documentElement.classList.add(theme);
        document.documentElement.style.colorScheme = theme;
        document.documentElement.style.background = theme === 'dark' ? '#030014' : '#F8FAFC';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
